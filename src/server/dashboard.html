<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Opportunity-to-Solution Copilot</title>
<style>
  :root{--border:#d0d7de;--bg:#f6f8fa;--text:#1f2328;--muted:#57606a;--blue:#0969da;
        --green:#1a7f37;--amber:#9a6700;--red:#cf222e}
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 system-ui,-apple-system,Segoe UI,sans-serif;color:var(--text)}
  header{padding:14px 22px;border-bottom:1px solid var(--border);background:#fff;
         display:flex;align-items:baseline;gap:14px}
  header h1{font-size:17px;margin:0}
  header span{color:var(--muted);font-size:12px}
  .layout{display:flex;min-height:calc(100vh - 55px)}
  aside{width:320px;min-width:260px;border-right:1px solid var(--border);background:var(--bg);
        padding:16px;overflow-y:auto}
  main{flex:1;padding:20px 26px;overflow-x:hidden;max-width:1100px}
  .card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:14px}
  .card h3{margin:0 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  label{display:block;font-size:12px;color:var(--muted);margin:8px 0 3px}
  input,textarea{width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:6px;font:inherit}
  textarea{min-height:90px;resize:vertical}
  button{padding:7px 14px;border:1px solid var(--border);border-radius:6px;background:#fff;
         font:inherit;cursor:pointer}
  button.primary{background:var(--blue);border-color:var(--blue);color:#fff}
  button.approve{background:var(--green);border-color:var(--green);color:#fff}
  button:disabled{opacity:.5;cursor:default}
  .runitem{padding:9px 10px;border:1px solid var(--border);border-radius:6px;background:#fff;
           margin-bottom:8px;cursor:pointer}
  .runitem:hover{border-color:var(--blue)}
  .runitem.sel{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue)}
  .runitem .id{font-family:ui-monospace,monospace;font-weight:600}
  .runitem .st{font-size:12px;color:var(--muted);word-break:break-word}
  .pill{display:inline-block;padding:1px 9px;border-radius:10px;font-size:11px;font-weight:600;color:#fff}
  .pill.done{background:var(--green)} .pill.running{background:var(--blue)}
  .pill.waiting{background:var(--amber)} .pill.error,.pill.paused{background:var(--red)}
  .pill.pending{background:#8c959f}
  /* flow stepper */
  .flow{display:flex;align-items:flex-start;flex-wrap:wrap;gap:4px;margin:6px 0 2px}
  .stage{flex:1;min-width:120px;text-align:center;padding:12px 8px;border:1px solid var(--border);
         border-radius:8px;background:#fff;position:relative}
  .stage .nm{font-weight:600;margin-bottom:6px}
  .stage.running{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue)}
  .stage.waiting{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber)}
  .stage.error,.stage.paused{border-color:var(--red)}
  .conn{align-self:center;text-align:center;color:var(--muted);font-size:10px;min-width:74px;padding:0 2px}
  .conn .arrow{font-size:16px;line-height:1}
  .banner{border-radius:8px;padding:12px 16px;margin:14px 0;display:flex;align-items:center;
          gap:14px;flex-wrap:wrap}
  .banner.gate{background:#fff8c5;border:1px solid var(--amber)}
  .banner.err{background:#ffebe9;border:1px solid var(--red)}
  table{border-collapse:collapse;width:100%;font-size:13px;margin:6px 0}
  th,td{border:1px solid var(--border);padding:5px 8px;text-align:left;vertical-align:top}
  th{background:var(--bg)}
  .scroll{overflow-x:auto}
  details{margin-bottom:12px}
  details summary{cursor:pointer;font-weight:600;padding:9px 12px;background:var(--bg);
                  border:1px solid var(--border);border-radius:8px}
  details[open] summary{border-radius:8px 8px 0 0}
  details .body{border:1px solid var(--border);border-top:0;border-radius:0 0 8px 8px;
                padding:12px 16px;background:#fff}
  .kind{color:#fff;border-radius:9px;padding:0 7px;font-size:11px}
  .kind.fact{background:var(--green)} .kind.estimate{background:var(--amber)} .kind.assumption{background:var(--red)}
  .file{display:flex;justify-content:space-between;align-items:center;padding:8px 4px;
        border-bottom:1px solid var(--bg)}
  .verdict{font-size:20px;font-weight:700;margin:4px 0 10px}
  .muted{color:var(--muted)} .mono{font-family:ui-monospace,monospace}
  a{color:var(--blue)}
  .empty{color:var(--muted);padding:40px;text-align:center}
  @media (max-width:760px){.layout{flex-direction:column}aside{width:100%;border-right:0;
    border-bottom:1px solid var(--border)}}
</style>
</head>
<body>
<header><h1>Opportunity-to-Solution Copilot</h1>
  <span>Discovery → Mapping → Research → Suitability · <a href="/docs">raw API</a></span></header>
<div class="layout">
<aside>
  <div class="card">
    <h3>New run</h3>
    <form id="newrun">
      <label>Business problem (be thorough — the interview is skipped in server mode)</label>
      <textarea id="f-problem" required placeholder="What is the problem, who has it, current process, volumes, tools, data available…"></textarea>
      <label>Model id (required — nothing is pinned)</label>
      <input id="f-model" required placeholder="e.g. your provider's model id">
      <label>Provider (optional, from config/llm.yaml)</label>
      <input id="f-provider" placeholder="default">
      <label>Research budget (optional)</label>
      <input id="f-budget" placeholder="e.g. 30m, 4h">
      <div style="margin-top:10px"><button class="primary" type="submit">Start run</button>
        <span id="f-msg" class="muted"></span></div>
    </form>
  </div>
  <div class="card"><h3>Runs</h3><div id="runlist" class="muted">loading…</div></div>
</aside>
<main id="main"><div class="empty">Select a run — or start one — to see its flow.</div></main>
</div>
<script>
const $=q=>document.querySelector(q);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let selected=null,timer=null;

const GATE_OWNER={confirm_problem:'discovery',validate_map:'mapping',approve_plan:'research'};
const GATE_LABEL={confirm_problem:'you confirm problem + data',validate_map:'you validate the map',
                  approve_plan:'you approve the research plan'};
const STAGES=[['discovery','Discovery','confirm_problem'],['mapping','Mapping','validate_map'],
              ['research','Research','approve_plan'],['suitability','Suitability',null]];

async function api(path,opts){const r=await fetch(path,opts);
  if(!r.ok){throw new Error((await r.json().catch(()=>({detail:r.statusText}))).detail)}return r.json()}

function stageStates(cf,sm){
  const done={discovery:!!cf.problem_statement&&cf.problem_confirmed_by_human,
    mapping:(cf.future_workflow||[]).length>0&&cf.map_validated_by_human,
    research:(cf.research_rounds_done||0)>0&&(cf.findings||[]).length>0,
    suitability:!!cf.suitability};
  const st={},s=sm.status||'';
  for(const[k]of STAGES)st[k]=done[k]?'done':'pending';
  if(s.startsWith('running:'))st[s.split(':')[1]]='running';
  if(s.startsWith('awaiting_gate:')){const o=GATE_OWNER[s.split(':')[1]];if(o)st[o]='waiting'}
  if(s.startsWith('error')&&sm.next_agent&&st[sm.next_agent]!=='done')st[sm.next_agent]='error';
  if(s==='paused_budget'&&sm.next_agent)st[sm.next_agent]='paused';
  return st;
}

function tbl(headers,rows){if(!rows.length)return'<p class="muted">none</p>';
  return`<div class="scroll"><table><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr>`+
    rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')+'</table></div>'}

function wfRows(steps){return(steps||[]).map(s=>[esc(s.id),esc(s.name),esc(s.actor),esc(s.system),
  esc(s.time_estimate),s.label?`<b>${esc(s.label)}</b><br>${esc(s.rationale)}`:esc((s.pain_points||[]).join('; '))])}

function render(data){
  const cf=data.casefile,sm=data.summary,st=stageStates(cf,sm),s=sm.status||'';
  let h=`<h2 style="margin:0 0 2px">Run <span class="mono">${esc(cf.run_id)}</span></h2>
    <p class="muted" style="margin:0 0 12px">status: <b>${esc(s)}</b> ·
      $${(cf.cost_spent_usd||0).toFixed(2)} spent · ${cf.llm_calls||0} LLM calls ·
      updated ${esc(cf.updated_at)}</p>`;

  h+='<div class="flow">';
  STAGES.forEach(([k,label,gate],i)=>{
    h+=`<div class="stage ${st[k]}"><div class="nm">${label}</div>
        <span class="pill ${st[k]}">${st[k]}</span></div>`;
    if(i<STAGES.length-1)h+=`<div class="conn"><div class="arrow">→</div>${gate?`gate:<br>${esc(GATE_LABEL[gate])}`:''}</div>`;
  });
  h+='</div>';

  if(s.startsWith('awaiting_gate:')){const g=s.split(':')[1];
    h+=`<div class="banner gate"><b>Waiting for you:</b> ${esc(GATE_LABEL[g]||g)} — review the
        details below, then <button class="approve" onclick="approve('${esc(cf.run_id)}')">Approve &amp; continue</button></div>`}
  if(s.startsWith('error')||s==='paused_budget'){
    h+=`<div class="banner err"><b>${s==='paused_budget'?'Paused on budget':'Error'}:</b>
        <span style="flex:1;word-break:break-word">${esc(s)}</span>
        <button onclick="resumeRun('${esc(cf.run_id)}')">Retry / resume</button></div>`}

  // files
  h+=`<div class="card"><h3>Files</h3><div id="files" class="muted">checking…</div></div>`;

  // stage details
  if(cf.problem_statement||(cf.captured||[]).length||(cf.data_inventory||[]).length){
    h+=`<details open><summary>1 · Discovery — problem &amp; data</summary><div class="body">
      <p><b>Real problem:</b> ${esc(cf.problem_statement)||'<i class="muted">not yet</i>'}</p>
      ${cf.stated_vs_real&&cf.stated_vs_real.stated?`<p><b>Stated:</b> ${esc(cf.stated_vs_real.stated)}<br>
        <b>Why different:</b> ${esc(cf.stated_vs_real.evidence||'')}</p>`:''}
      <h4>Captured fields</h4>${tbl(['field','value','status'],(cf.captured||[]).map(c=>[esc(c.field),esc(c.value),esc(c.status)]))}
      <h4>Data inventory</h4>${tbl(['name','format','location','sensitivity','status'],
        (cf.data_inventory||[]).map(d=>[esc(d.name),esc(d.format),esc(d.location),esc(d.sensitivity),esc(d.status)]))}
      </div></details>`}
  if((cf.current_workflow||[]).length||(cf.future_workflow||[]).length){
    h+=`<details open><summary>2 · Mapping — current &amp; future workflow</summary><div class="body">
      <h4>Current</h4>${tbl(['id','step','actor','system','time','pain'],wfRows(cf.current_workflow))}
      <h4>Future (labels: AI-assist / deterministic-automation / human-owned / redesign-first)</h4>
      ${tbl(['id','step','actor','system','time','label / rationale'],wfRows(cf.future_workflow))}
      </div></details>`}
  if(cf.research_plan){const p=cf.research_plan;
    h+=`<details open><summary>3 · Research — plan${p.approved_by_human?' (approved)':' (awaiting approval)'}, findings &amp; landscape</summary><div class="body">
      <p><b>Target profile:</b> ${esc(p.target_profile)}</p>
      <p><b>Capabilities:</b> ${esc((p.capabilities||[]).join(' · '))}</p>
      <p><b>Questions:</b></p><ul>${(p.questions||[]).map(q=>`<li>${esc(q)}</li>`).join('')}</ul>
      <p class="muted">rounds done: ${cf.research_rounds_done||0}</p>`;
    const cats=Object.entries(cf.tool_landscape||{});
    if(cats.length){h+='<h4>Tool landscape</h4>';
      for(const[cat,opts]of cats){h+=`<p style="margin:10px 0 2px"><b>${esc(cat)}</b></p>`+
        tbl(['option','similarity','matched / missing','build $ (est)','monthly $ (est)','exists?'],
          opts.map(o=>[`<a href="${esc(o.url)}" target="_blank">${esc(o.name)}</a>`,
            `${o.similarity?.index??0}/100`,
            `${(o.similarity?.matched||[]).length} / ${(o.similarity?.missing||[]).length}`,
            `${Math.round(o.costs?.build_cost_usd_low||0)}–${Math.round(o.costs?.build_cost_usd_high||0)}`,
            (o.costs?.monthly_operation_usd||0).toFixed(0),
            o.similarity?.existing_solution?'<b style="color:var(--red)">yes</b>':'no']))}}
    const fs=cf.findings||[];
    if(fs.length){h+=`<h4>Findings (${fs.length})</h4>`+
      tbl(['id','kind','claim','source'],fs.slice(0,150).map(f=>[esc(f.id),
        `<span class="kind ${esc(f.kind)}">${esc(f.kind)}</span>${f.vendor_claim?' ⚑vendor':''}`,
        esc(f.claim),`<a href="${esc(f.source.url)}" target="_blank">${esc(f.source.title||f.source.url)}</a>${f.source.verified?' ✓':''}`]));
      if(fs.length>150)h+=`<p class="muted">…showing 150 of ${fs.length} — full set in casefile.json</p>`}
    if((cf.open_questions||[]).length)h+=`<h4>Open questions</h4><ul>${cf.open_questions.map(q=>`<li>${esc(q)}</li>`).join('')}</ul>`;
    h+='</div></details>'}
  if(cf.suitability){const v=cf.suitability;
    h+=`<details open><summary>4 · Suitability — verdict</summary><div class="body">
      <div class="verdict">${esc(v.verdict)}</div>
      <p>${Object.entries(v.scores||{}).map(([k,x])=>`${esc(k)} <b>${x}/10</b>`).join(' · ')}</p>
      <p style="white-space:pre-wrap">${esc(v.rationale)}</p>
      ${v.better_path?`<p><b>Better path:</b> ${esc(v.better_path)}</p>`:''}
      <p class="muted">evidence: ${esc((v.cited_finding_ids||[]).join(', '))}</p></div></details>`}

  $('#main').innerHTML=h;
  loadFiles(cf.run_id);
}

async function loadFiles(id){
  try{const d=await api(`/runs/${id}/files`);
    $('#files').innerHTML=d.files.map(f=>`<div class="file">
      <span>${esc(f.name)} ${f.available?`<span class="muted">(${(f.size/1024).toFixed(1)} KB)</span>`:'<span class="muted">— not generated yet</span>'}</span>
      <span>${f.available?`<a href="${esc(f.url)}" download>download</a>${f.name==='report.html'?` · <a href="/runs/${id}/report" target="_blank">view</a>`:''}`:''}</span>
      </div>`).join('');
  }catch(e){$('#files').textContent=e.message}}

async function select(id){selected=id;await refresh();listRuns()}
async function refresh(){if(!selected)return;
  try{render(await api(`/runs/${selected}`))}catch(e){$('#main').innerHTML=`<div class="empty">${esc(e.message)}</div>`}}

async function listRuns(){
  try{const runs=await api('/runs');
    $('#runlist').innerHTML=runs.length?runs.map(r=>`
      <div class="runitem ${r.run_id===selected?'sel':''}" onclick="select('${esc(r.run_id)}')">
        <div class="id">${esc(r.run_id)}</div>
        <div class="st">${esc(r.status)}${r.verdict?` · <b>${esc(r.verdict)}</b>`:''}</div>
      </div>`).join(''):'<span class="muted">no runs yet — note: on serverless hosting runs are '+
      'ephemeral and may disappear; download files as soon as they are ready.</span>';
  }catch(e){$('#runlist').textContent=e.message}}

async function approve(id){try{await api(`/runs/${id}/approve`,{method:'POST'});await refresh()}
  catch(e){alert(e.message)}}
async function resumeRun(id){try{await api(`/runs/${id}/resume`,{method:'POST'});await refresh()}
  catch(e){alert(e.message)}}

$('#newrun').addEventListener('submit',async ev=>{ev.preventDefault();
  $('#f-msg').textContent='starting…';
  try{const d=await api('/runs',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({problem:$('#f-problem').value,model:$('#f-model').value||null,
        provider:$('#f-provider').value||null,budget:$('#f-budget').value||null})});
    $('#f-msg').textContent='';$('#f-problem').value='';await select(d.run_id);
  }catch(e){$('#f-msg').textContent=e.message}});

listRuns();
timer=setInterval(async()=>{await refresh();
  if(document.visibilityState==='visible')listRuns()},4000);
</script>
</body>
</html>
