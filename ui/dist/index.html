    <title>O2S Operator Console</title>
    <script>
      // self-heal: if a cached shell points at a bundle this deploy no longer
      // has, force one cache-busting reload instead of showing a blank page
      window.addEventListener('error', function (e) {
        var t = e.target || {};
        if ((t.tagName === 'SCRIPT' || t.tagName === 'LINK') &&
            String(t.src || t.href).indexOf('/assets/') !== -1 &&
            !sessionStorage.getItem('o2s_reloaded')) {
          sessionStorage.setItem('o2s_reloaded', '1');
          location.replace(location.pathname + '?bust=' + Date.now() + location.hash);
        }
      }, true);
    </script>
